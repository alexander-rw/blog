alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
domains:
- domain: alexander-rw.com
  type: PRIMARY
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: blog
    cors:
      allow_methods:
      - GET
      - OPTIONS
      allow_origins:
      - exact: https://*
    match:
      authority:
        exact: alexander-rw.com
      path:
        prefix: /
name: alexander-rw-blog
region: lon
services:
- environment_slug: rust
  github:
    branch: main
    deploy_on_push: true
    repo: alexander-rw/blog
  http_port: 3084
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: blog
  source_dir: /
